<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>
(function () {
  var stored = localStorage.getItem("patchworkz_theme");
  var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>
<title>Patchworkz — IT Service Queue</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232a78d6'/%3E%3Ctext x='16' y='22' font-family='system-ui,sans-serif' font-size='17' font-weight='700' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --surface-2: #f1f0ec;
    --ink: #0b0b0b;
    --ink-secondary: #52514e;
    --ink-muted: #898781;
    --line: #e1e0d9;
    --border: rgba(11, 11, 11, 0.10);
    --accent: #2a78d6;
    --accent-ink: #ffffff;
    --shadow: 0 1px 2px rgba(11, 11, 11, 0.04), 0 6px 16px rgba(11, 11, 11, 0.06);

    --p1: #e34948;
    --p2: #eb6834;
    --p3: #2a78d6;
    --p4: #898781;

    --status-progress-bg: #eda100;
    --status-progress-ink: #241900;
    --status-resolved-bg: #0ca30c;
    --status-resolved-ink: #ffffff;

    --chart-1: #2a78d6; --chart-2: #1baf7a; --chart-3: #eda100; --chart-4: #008300;
    --chart-5: #4a3aa7; --chart-6: #e34948; --chart-7: #e87ba4; --chart-8: #eb6834;

    color-scheme: light;
  }
  :root[data-theme="dark"] {
    --page: #0d0d0d;
    --surface: #1a1a19;
    --surface-2: #212120;
    --ink: #ffffff;
    --ink-secondary: #c3c2b7;
    --ink-muted: #898781;
    --line: #2c2c2a;
    --border: rgba(255, 255, 255, 0.10);
    --accent: #3987e5;
    --accent-ink: #ffffff;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 8px 20px rgba(0, 0, 0, 0.4);

    --p1: #e66767;
    --p2: #d95926;
    --p3: #3987e5;
    --p4: #898781;

    --status-progress-bg: #c98500;
    --status-progress-ink: #fff6e0;
    --status-resolved-bg: #0ca30c;
    --status-resolved-ink: #ffffff;

    --chart-1: #3987e5; --chart-2: #199e70; --chart-3: #c98500; --chart-4: #008300;
    --chart-5: #9085e9; --chart-6: #e66767; --chart-7: #d55181; --chart-8: #d95926;

    color-scheme: dark;
  }

  * { box-sizing: border-box; margin: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--page);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
  }
  .mono { font-family: "IBM Plex Mono", monospace; }

  body, .panel, .ticket, input, textarea, button, header, .status-select, details.ai, .badge {
    transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    color: var(--ink);
    padding: 12px clamp(14px, 4vw, 24px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: nowrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1 1 auto; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    background: linear-gradient(135deg, var(--accent), #1baf7a);
    color: #fff; font-weight: 700; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-text { min-width: 0; }
  .brand-text h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.01em; }
  .brand-text .sub {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.72rem;
    color: var(--ink-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .theme-toggle {
    width: 38px; height: 38px; border-radius: 999px; flex: none;
    border: 1px solid var(--line);
    background: var(--page);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .theme-toggle:hover { background: var(--surface-2); }
  .theme-toggle:active { transform: scale(0.94); }
  .theme-toggle svg { width: 18px; height: 18px; }
  .theme-toggle .icon-sun, .theme-toggle .icon-moon { display: none; }
  :root[data-theme="light"] .theme-toggle .icon-moon { display: block; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: block; }

  .layout {
    display: grid;
    grid-template-columns: minmax(280px, 360px) 1fr;
    gap: clamp(14px, 3vw, 24px);
    max-width: 1100px;
    margin: clamp(14px, 3vw, 24px) auto;
    padding: 0 clamp(14px, 4vw, 24px);
  }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: 10px;
    padding: clamp(14px, 4vw, 20px);
    min-width: 0;
  }
  .panel h2 {
    font-size: 0.8rem;
    font-family: "IBM Plex Mono", monospace;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    margin-bottom: 16px;
  }

  form { display: grid; gap: 12px; }
  label { font-size: 0.85rem; font-weight: 600; display: grid; gap: 4px; }
  input, textarea {
    font: inherit;
    font-size: 16px;
    width: 100%;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    color: var(--ink);
  }
  input::placeholder, textarea::placeholder { color: var(--ink-muted); }
  input:focus, textarea:focus, button:focus-visible, .theme-toggle:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  textarea { min-height: 110px; resize: vertical; }
  button {
    font: inherit;
    font-weight: 600;
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 6px;
    padding: 12px;
    min-height: 44px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:active:not(:disabled) { filter: brightness(0.95); }
  button:disabled { opacity: 0.6; cursor: wait; }
  .status-msg {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.78rem;
    color: var(--ink-muted);
    min-height: 1.2em;
  }

  .queue { display: grid; gap: 12px; }
  .ticket {
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 6px solid var(--p3);
    box-shadow: var(--shadow);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .ticket.P1 { border-left-color: var(--p1); }
  .ticket.P2 { border-left-color: var(--p2); }
  .ticket.P3 { border-left-color: var(--p3); }
  .ticket.P4 { border-left-color: var(--p4); }

  .ticket-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .tkt-id {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--ink-muted);
  }
  .badge {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--ink-secondary);
    background: var(--surface-2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge.pri { color: #fff; border: none; }
  .badge.pri.P1 { background: var(--p1); }
  .badge.pri.P2 { background: var(--p2); }
  .badge.pri.P3 { background: var(--p3); }
  .badge.pri.P4 { background: var(--p4); }

  .ticket h3 { font-size: 1rem; font-weight: 600; overflow-wrap: anywhere; }
  .ticket .meta { font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 6px; overflow-wrap: anywhere; }
  .ticket p.desc { font-size: 0.9rem; margin-bottom: 8px; overflow-wrap: anywhere; }

  details.ai {
    background: var(--surface-2);
    border: 1px dashed var(--line);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 0.87rem;
  }
  details.ai summary {
    cursor: pointer;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent);
  }
  details.ai .reasoning {
    font-size: 0.78rem;
    color: var(--ink-muted);
    margin-top: 6px;
    font-style: italic;
  }
  .empty {
    text-align: center;
    color: var(--ink-muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.85rem;
    padding: 40px 0;
  }

  .staff-panel { margin-top: 24px; background: var(--surface-2); box-shadow: none; }
  .staff-panel .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
  .staff-panel .toggle-link {
    background: none; border: none; color: var(--accent); font-weight: 600;
    font-size: 0.8rem; padding: 6px 0; cursor: pointer; text-align: left;
    min-height: auto;
  }
  .staff-panel .toggle-link:hover { filter: none; text-decoration: underline; }
  .signed-in { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .signed-in .who { font-family: "IBM Plex Mono", monospace; font-size: 0.85rem; overflow-wrap: anywhere; }
  .btn-secondary {
    background: transparent; color: var(--accent); border: 1px solid var(--line);
    font-weight: 600; border-radius: 6px; padding: 8px 12px; min-height: 40px; cursor: pointer; font: inherit;
  }
  .btn-secondary:hover { filter: none; background: var(--page); }

  .status-select {
    font: inherit; font-size: 0.8rem; padding: 6px 8px; min-height: 32px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--page); color: var(--ink); cursor: pointer;
  }
  .status-select[data-status="in_progress"] { border-color: var(--status-progress-bg); color: var(--status-progress-bg); font-weight: 600; }
  .status-select[data-status="resolved"] { border-color: var(--status-resolved-bg); color: var(--status-resolved-bg); font-weight: 600; }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .chart-box { position: relative; height: 170px; min-width: 0; }
  .locked {
    text-align: center;
    color: var(--ink-muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.85rem;
    padding: 40px 20px;
    border: 1px dashed var(--line);
    border-radius: 10px;
  }

  footer {
    text-align: center;
    color: var(--ink-muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.72rem;
    padding: 8px 24px 32px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">P</div>
    <div class="brand-text">
      <h1>Patchworkz</h1>
      <span class="sub">IT service queue · triaged by Claude</span>
    </div>
  </div>
  <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"></circle>
      <line x1="12" y1="2" x2="12" y2="4"></line>
      <line x1="12" y1="20" x2="12" y2="22"></line>
      <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
      <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
      <line x1="2" y1="12" x2="4" y2="12"></line>
      <line x1="20" y1="12" x2="22" y2="12"></line>
      <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
      <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
</header>

<div class="layout">

  <section class="panel">
    <h2>New ticket</h2>
    <form id="ticket-form">
      <label>Your name
        <input name="requester_name" required maxlength="100" placeholder="Sarah Chen" />
      </label>
      <label>Email
        <input name="requester_email" type="email" required placeholder="sarah@example.com" />
      </label>
      <label>Subject
        <input name="subject" required minlength="3" maxlength="200" placeholder="VPN keeps disconnecting" />
      </label>
      <label>Describe the issue
        <textarea name="description" required minlength="10" maxlength="5000"
          placeholder="What happened, when it started, what you've already tried..."></textarea>
      </label>
      <button type="submit" id="submit-btn">Submit ticket</button>
      <div class="status-msg" id="status-msg" role="status"></div>
    </form>

    <div class="panel staff-panel" id="staff-panel">
      <h2>Staff</h2>
      <div id="staff-signed-out">
        <form id="auth-form">
          <label>Username
            <input name="username" id="auth-username" required maxlength="50" />
          </label>
          <label>Password
            <input name="password" id="auth-password" type="password" required minlength="8" maxlength="200" />
          </label>
          <button type="submit" id="auth-btn">Log in</button>
          <button type="button" class="toggle-link" id="auth-toggle">New agent? Register instead</button>
          <div class="status-msg" id="auth-msg" role="status"></div>
        </form>
      </div>
      <div id="staff-signed-in" class="signed-in" style="display:none;">
        <span class="who">Signed in as <strong id="who-username"></strong></span>
        <button type="button" class="btn-secondary" id="logout-btn">Log out</button>
      </div>
    </div>
  </section>

  <section>
    <div id="dashboard-area"></div>
    <div class="queue" id="queue">
      <div class="locked">Staff login required to view the ticket queue.</div>
    </div>
  </section>

</div>

<footer>Patchworkz — AI-powered IT ticket triage, built with FastAPI + Claude</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
const form = document.getElementById("ticket-form");
const btn = document.getElementById("submit-btn");
const statusMsg = document.getElementById("status-msg");
const queue = document.getElementById("queue");
const dashboardArea = document.getElementById("dashboard-area");
const themeToggle = document.getElementById("theme-toggle");

const authForm = document.getElementById("auth-form");
const authBtn = document.getElementById("auth-btn");
const authToggle = document.getElementById("auth-toggle");
const authMsg = document.getElementById("auth-msg");
const signedOut = document.getElementById("staff-signed-out");
const signedIn = document.getElementById("staff-signed-in");
const whoUsername = document.getElementById("who-username");
const logoutBtn = document.getElementById("logout-btn");

const STATUSES = ["open", "in_progress", "resolved"];
const TOKEN_KEY = "patchworkz_token";
const USER_KEY = "patchworkz_username";
const THEME_KEY = "patchworkz_theme";
let authMode = "login"; // or "register"
let charts = {};
let lastStats = null;

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s ?? "";
  return d.innerHTML;
}

function getToken() { return localStorage.getItem(TOKEN_KEY); }

function authHeaders() {
  const token = getToken();
  return token ? { Authorization: "Bearer " + token } : {};
}

function updateAuthUI() {
  const token = getToken();
  if (token) {
    signedOut.style.display = "none";
    signedIn.style.display = "flex";
    whoUsername.textContent = localStorage.getItem(USER_KEY) || "";
  } else {
    signedOut.style.display = "block";
    signedIn.style.display = "none";
  }
}

function statusOptions(current) {
  return STATUSES.map(
    (s) => `<option value="${s}" ${s === current ? "selected" : ""}>${s.replace("_", " ")}</option>`
  ).join("");
}

function ticketCard(t) {
  const id = "TKT-" + String(t.id).padStart(4, "0");
  const when = t.created_at ? t.created_at.replace("T", " ").slice(0, 16) + " UTC" : "";
  const ai = t.suggested_response
    ? `<details class="ai">
         <summary>Suggested first response</summary>
         <p>${esc(t.suggested_response)}</p>
         ${t.triage_reasoning ? `<p class="reasoning">Triage: ${esc(t.triage_reasoning)}</p>` : ""}
       </details>`
    : `<details class="ai"><summary>No AI suggestion</summary>
         <p class="reasoning">${esc(t.triage_reasoning || "Awaiting manual review.")}</p>
       </details>`;

  return `<article class="ticket ${esc(t.priority)}">
    <div class="ticket-top">
      <span class="tkt-id">${id}</span>
      <span class="badge pri ${esc(t.priority)}">${esc(t.priority)}</span>
      <span class="badge">${esc(t.category)}</span>
      <select class="status-select" data-id="${t.id}" data-status="${esc(t.status)}">${statusOptions(t.status)}</select>
    </div>
    <h3>${esc(t.subject)}</h3>
    <div class="meta">${esc(t.requester_name)} · ${esc(t.requester_email)} · <span class="mono">${esc(when)}</span></div>
    <p class="desc">${esc(t.description)}</p>
    ${ai}
  </article>`;
}

function themeVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function renderDashboard(stats) {
  lastStats = stats;
  if (!dashboardArea.querySelector("#chart-category")) {
    dashboardArea.innerHTML = `
      <div class="panel dashboard">
        <div class="chart-box"><canvas id="chart-category"></canvas></div>
        <div class="chart-box"><canvas id="chart-priority"></canvas></div>
        <div class="chart-box"><canvas id="chart-status"></canvas></div>
      </div>`;
  }
  const surface = themeVar("--surface");
  const inkSecondary = themeVar("--ink-secondary");
  const chartColors = [1, 2, 3, 4, 5, 6, 7, 8].map((n) => themeVar(`--chart-${n}`));

  const build = (id, label, data, existing) => {
    if (existing) existing.destroy();
    const labels = Object.keys(data);
    const values = Object.values(data);
    return new Chart(document.getElementById(id), {
      type: "doughnut",
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: chartColors, borderColor: surface, borderWidth: 2, hoverOffset: 6 }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          title: { display: true, text: label, color: inkSecondary, font: { family: "'IBM Plex Mono', monospace", size: 11, weight: "600" } },
          legend: { position: "bottom", labels: { color: inkSecondary, boxWidth: 10, boxHeight: 10, padding: 8, font: { size: 11 } } },
        },
      },
    });
  };
  charts.category = build("chart-category", "By category", stats.by_category, charts.category);
  charts.priority = build("chart-priority", "By priority", stats.by_priority, charts.priority);
  charts.status = build("chart-status", "By status", stats.by_status, charts.status);
}

async function loadTickets() {
  const token = getToken();
  if (!token) {
    dashboardArea.innerHTML = "";
    charts = {};
    lastStats = null;
    queue.innerHTML = '<div class="locked">Staff login required to view the ticket queue.</div>';
    return;
  }
  try {
    const [ticketsRes, statsRes] = await Promise.all([
      fetch("/api/tickets", { headers: authHeaders() }),
      fetch("/api/tickets/stats", { headers: authHeaders() }),
    ]);
    if (ticketsRes.status === 401 || statsRes.status === 401) {
      logout();
      return;
    }
    const tickets = await ticketsRes.json();
    const stats = await statsRes.json();
    renderDashboard(stats);
    queue.innerHTML = tickets.length
      ? tickets.map(ticketCard).join("")
      : '<div class="empty">Queue is clear. Submit the first ticket →</div>';
  } catch {
    queue.innerHTML = '<div class="empty">Could not load tickets. Is the server running?</div>';
  }
}

queue.addEventListener("change", async (e) => {
  if (!e.target.classList.contains("status-select")) return;
  const id = e.target.dataset.id;
  const newStatus = e.target.value;
  try {
    const res = await fetch(`/api/tickets/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", ...authHeaders() },
      body: JSON.stringify({ status: newStatus }),
    });
    if (!res.ok) throw new Error("Update failed");
    await loadTickets();
  } catch {
    alert("Could not update status.");
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.disabled = true;
  statusMsg.textContent = "Submitting… Claude is triaging your ticket.";

  const payload = Object.fromEntries(new FormData(form).entries());
  try {
    const res = await fetch("/api/tickets", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail?.[0]?.msg || "Submission failed");
    }
    const t = await res.json();
    statusMsg.textContent =
      `Filed as TKT-${String(t.id).padStart(4, "0")} · ${t.priority} · ${t.category}`;
    form.reset();
    await loadTickets();
  } catch (err) {
    statusMsg.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
});

authToggle.addEventListener("click", () => {
  authMode = authMode === "login" ? "register" : "login";
  authBtn.textContent = authMode === "login" ? "Log in" : "Register";
  authToggle.textContent = authMode === "login"
    ? "New agent? Register instead"
    : "Already have an account? Log in instead";
  authMsg.textContent = "";
});

authForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  authBtn.disabled = true;
  const username = document.getElementById("auth-username").value;
  const password = document.getElementById("auth-password").value;

  try {
    if (authMode === "register") {
      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || "Registration failed");
      }
      authMsg.textContent = "Account created — logging you in…";
    }

    const form2 = new URLSearchParams();
    form2.set("username", username);
    form2.set("password", password);
    const loginRes = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: form2,
    });
    if (!loginRes.ok) {
      const err = await loginRes.json().catch(() => ({}));
      throw new Error(err.detail || "Login failed");
    }
    const { access_token } = await loginRes.json();
    localStorage.setItem(TOKEN_KEY, access_token);
    localStorage.setItem(USER_KEY, username);
    authForm.reset();
    authMsg.textContent = "";
    updateAuthUI();
    await loadTickets();
  } catch (err) {
    authMsg.textContent = "Error: " + err.message;
  } finally {
    authBtn.disabled = false;
  }
});

function logout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
  updateAuthUI();
  loadTickets();
}
logoutBtn.addEventListener("click", logout);

function currentTheme() {
  return document.documentElement.getAttribute("data-theme") || "light";
}
function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem(THEME_KEY, theme);
  themeToggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
  if (lastStats) renderDashboard(lastStats);
}
themeToggle.addEventListener("click", () => setTheme(currentTheme() === "dark" ? "light" : "dark"));
themeToggle.setAttribute("aria-label", currentTheme() === "dark" ? "Switch to light mode" : "Switch to dark mode");

updateAuthUI();
loadTickets();
</script>
</body>
</html>
